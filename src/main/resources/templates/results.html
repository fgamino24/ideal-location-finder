<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th>Rank</th>
        <th>Place</th>
        <th>Walkability</th>
        <th>Transit</th>
        <th>Safety</th>
        <th>Cost</th>
        <th>Amenities</th>
        <th>Airport</th>
        <th>Total</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="ps, iter : ${ranked}">
        <td th:text="${iter.index + 1}"></td>

        <td th:text="${ps.place.name}"></td>

        <td th:text="${ps.walkabilityScore}"></td>
        <td th:text="${ps.transitScore}"></td>
        <td th:text="${ps.safetyScore}"></td>
        <td th:text="${ps.costScore}"></td>
        <td th:text="${ps.amenitiesScore}"></td>
        <td th:text="${ps.airportScore}"></td>

        <td th:text="${ps.totalScore}"></td>

    </tr>

    </tbody>
</table>
<h3>Dealbreakers used (minimums)</h3>
<ul>
    <li>Walkability ≥ <span th:text="${constraints.minWalkability}"></span></li>
    <li>Transit ≥ <span th:text="${constraints.minTransit}"></span></li>
    <li>Safety ≥ <span th:text="${constraints.minSafety}"></span></li>
    <li>Cost ≥ <span th:text="${constraints.minCost}"></span></li>
    <li>Amenities ≥ <span th:text="${constraints.minAmenities}"></span></li>
    <li>Airport ≥ <span th:text="${constraints.minAirportAccess}"></span></li>
</ul>
